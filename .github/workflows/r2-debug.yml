name: R2 rclone debug (throwaway)

# 临时诊断 v2：复现真实 deploy 的 sync 501，并按 flag 二分定位元凶。
# 只手动 workflow_dispatch；上传假文件到 _v2* 前缀，跑完清理。验完即删本文件。
# 真实失败命令：
#   rclone sync dist R2:bucket --checksum --fast-list --transfers=16 --checkers=32 --retries 5
# 已知：rclone copy（无 --fast-list、transfers=4）到空前缀 → 全部 200。故元凶在 flag 差异里。

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  R2_BUCKET: zhiyuanwiki
  RCLONE_CONFIG_R2_TYPE: s3
  RCLONE_CONFIG_R2_PROVIDER: Cloudflare
  RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
  RCLONE_CONFIG_R2_ACL: private
  RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Make dummy dist
        run: |
          mkdir -p debugdist/zj/yuanxiao/2219 debugdist/data/hn
          printf 'a' > debugdist/index.html
          printf 'b' > debugdist/zj/yuanxiao/2219/index.html
          printf '{"x":1}' > debugdist/data/hn/locator-lishi.json

      - name: Install apt rclone (the real deploy binary)
        run: sudo apt-get update && sudo apt-get install -y rclone && rclone version

      # ---- V-A: 一字不差复现真实 sync（dump headers 看 501 是哪个头） ----
      - name: 'V-A — EXACT real sync flags (sync --checksum --fast-list --transfers=16 --checkers=32) + dump headers'
        continue-on-error: true
        run: |
          echo "===== V-A ====="
          rclone sync debugdist "R2:${R2_BUCKET}/_v2a" \
            --checksum --fast-list --transfers=16 --checkers=32 --retries 1 \
            -vv --dump headers 2>&1 | tail -120 || true

      # ---- V-B: 去掉 --fast-list ----
      - name: 'V-B — drop --fast-list'
        continue-on-error: true
        run: |
          echo "===== V-B ====="
          rclone sync debugdist "R2:${R2_BUCKET}/_v2b" \
            --checksum --transfers=16 --checkers=32 --retries 1 --stats-one-line 2>&1 | tail -20 || true

      # ---- V-C: 去掉 --checksum ----
      - name: 'V-C — drop --checksum'
        continue-on-error: true
        run: |
          echo "===== V-C ====="
          rclone sync debugdist "R2:${R2_BUCKET}/_v2c" \
            --fast-list --transfers=16 --checkers=32 --retries 1 --stats-one-line 2>&1 | tail -20 || true

      # ---- V-D: 串行（transfers=1 checkers=1），其余同真实 ----
      - name: 'V-D — serial (transfers=1 checkers=1), else real flags'
        continue-on-error: true
        run: |
          echo "===== V-D ====="
          rclone sync debugdist "R2:${R2_BUCKET}/_v2d" \
            --checksum --fast-list --transfers=1 --checkers=1 --retries 1 --stats-one-line 2>&1 | tail -20 || true

      # ---- V-E: copy（非 sync）+ 真实并发/flag，对照 sync vs copy ----
      - name: 'V-E — copy (not sync) + real flags'
        continue-on-error: true
        run: |
          echo "===== V-E ====="
          rclone copy debugdist "R2:${R2_BUCKET}/_v2e" \
            --checksum --fast-list --transfers=16 --checkers=32 --retries 1 --stats-one-line 2>&1 | tail -20 || true

      - name: List landed + cleanup
        if: always()
        continue-on-error: true
        run: |
          for p in _v2a _v2b _v2c _v2d _v2e; do
            echo "===== landed under ${p} ====="
            rclone lsf -R "R2:${R2_BUCKET}/${p}" 2>&1 || echo "(list failed)"
          done
          echo "===== cleanup ====="
          for p in _v2a _v2b _v2c _v2d _v2e; do
            rclone delete "R2:${R2_BUCKET}/${p}" 2>&1 || echo "(delete ${p} failed/empty)"
          done
