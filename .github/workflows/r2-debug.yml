name: R2 rclone debug (throwaway)

# 临时诊断 v3：确认 --s3-no-head 修复。
# 真相：PUT 全部 200（文件确实落桶），501 出在 rclone 上传后的校验
#   HEAD /...?versionId=<id>  —— 桶开了对象版本控制，R2 对 ?versionId= 间歇回 501。
# 修复：--s3-no-head 跳过上传后 HEAD 校验。本 run 同窗口对比 repro vs fix。
# 只手动 workflow_dispatch；假文件传 _v3* 前缀，跑完清理。验完即删本文件。

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  R2_BUCKET: zhiyuanwiki
  RCLONE_CONFIG_R2_TYPE: s3
  RCLONE_CONFIG_R2_PROVIDER: Cloudflare
  RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
  RCLONE_CONFIG_R2_ACL: private
  RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Make dummy dist
        run: |
          mkdir -p debugdist/zj/yuanxiao/2219 debugdist/data/hn
          printf 'a' > debugdist/index.html
          printf 'b' > debugdist/zj/yuanxiao/2219/index.html
          printf '{"x":1}' > debugdist/data/hn/locator-lishi.json

      - name: Install apt rclone
        run: sudo apt-get update && sudo apt-get install -y rclone && rclone version

      # repro 跑两次，提高撞上 R2 间歇 501 的概率
      - name: 'REPRO #1 — exact real sync (expect 501 if R2 flaky now)'
        continue-on-error: true
        run: |
          echo "===== REPRO #1 ====="
          rclone sync debugdist "R2:${R2_BUCKET}/_v3a1" \
            --checksum --fast-list --transfers=16 --checkers=32 --retries 1 --stats-one-line 2>&1 | tail -15 || true

      - name: 'REPRO #2 — exact real sync (again)'
        continue-on-error: true
        run: |
          echo "===== REPRO #2 ====="
          rclone sync debugdist "R2:${R2_BUCKET}/_v3a2" \
            --checksum --fast-list --transfers=16 --checkers=32 --retries 1 --stats-one-line 2>&1 | tail -15 || true

      # FIX：同样 flag + --s3-no-head（跳过上传后校验 HEAD）。跑两次确认稳定。
      - name: 'FIX #1 — real sync + --s3-no-head (expect success)'
        continue-on-error: true
        run: |
          echo "===== FIX #1 ====="
          rclone sync debugdist "R2:${R2_BUCKET}/_v3b1" \
            --checksum --fast-list --transfers=16 --checkers=32 --s3-no-head --retries 1 --stats-one-line 2>&1 | tail -15 || true

      - name: 'FIX #2 — real sync + --s3-no-head (again)'
        continue-on-error: true
        run: |
          echo "===== FIX #2 ====="
          rclone sync debugdist "R2:${R2_BUCKET}/_v3b2" \
            --checksum --fast-list --transfers=16 --checkers=32 --s3-no-head --retries 1 --stats-one-line 2>&1 | tail -15 || true

      - name: List landed + cleanup
        if: always()
        continue-on-error: true
        run: |
          for p in _v3a1 _v3a2 _v3b1 _v3b2; do
            echo "===== landed under ${p} ====="
            rclone lsf -R "R2:${R2_BUCKET}/${p}" 2>&1 | rg -v '/$' || echo "(none/list failed)"
          done
          echo "===== cleanup ====="
          for p in _v3a1 _v3a2 _v3b1 _v3b2; do
            rclone delete "R2:${R2_BUCKET}/${p}" --s3-no-head 2>&1 || echo "(delete ${p} failed/empty)"
          done
