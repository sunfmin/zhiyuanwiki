name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      # 这些 action 用支持 Node 24 的大版本，避免 Node 20 弃用告警。
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # 只跑 astro build：读取仓库内已提交的 src/data JSON。
      # 不在 CI 跑 Go 预处理——原始 xlsx 不入仓库（ADR-0005），数据由维护者本地生成后提交。
      - run: npm run build
      # Pages 项目须预先建好（见 README）。原先的"幂等创建"步骤在项目已存在时每次报错、
      # 产生误导性的 "Action failed" 注解，已移除。
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=zhiyuanwiki --branch=main --commit-dirty=true
